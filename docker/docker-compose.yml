services:
  postgres:
    image: postgres:17-alpine
    container_name: skilky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skilky}
      POSTGRES_USER: ${POSTGRES_USER:-skilky}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skilky}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skilky} -d ${POSTGRES_DB:-skilky}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: skilky-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      # Persist downloaded models so re-creating the container does not
      # re-download multi-GB weights. Lives outside the container's
      # writable layer so disk reclaim works the normal way.
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  # One-shot: pulls the configured chat model once Ollama is healthy,
  # then exits. Re-running `docker compose up` is a no-op if the model
  # is already present — Ollama's pull endpoint is idempotent.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: skilky-ollama-pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-gemma4:e4b}"]

volumes:
  postgres-data:
  ollama-data:
