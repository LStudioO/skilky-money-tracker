services:
  postgres:
    image: postgres:17-alpine
    container_name: skilky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skilky}
      POSTGRES_USER: ${POSTGRES_USER:-skilky}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skilky}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skilky} -d ${POSTGRES_DB:-skilky}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
