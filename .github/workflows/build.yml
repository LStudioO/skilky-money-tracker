name: Build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ios:
              - 'composeApp/**'
              - 'shared/**'
              - 'iosApp/**'
              - 'gradle/**'
              - 'build-logic/**'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - '.github/workflows/build.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Spotless + Detekt
        run: ./gradlew spotlessCheck detekt --stacktrace

  test-jvm:
    name: JVM tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run shared + composeApp JVM tests
        run: ./gradlew :shared:jvmTest :composeApp:jvmTest --stacktrace
      - name: Publish JVM test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: JVM tests report
          report_paths: '**/build/test-results/**/TEST-*.xml'

  build-server:
    name: Server
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build server + run server tests + coverage
        run: ./gradlew :server:build :server:koverXmlReport --stacktrace
      - name: Publish server test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Server tests report
          report_paths: 'server/build/test-results/**/TEST-*.xml'
      - name: Comment server coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: server/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Server coverage
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          update-comment: true
      - name: Upload server JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: server-jar
          path: server/build/libs/*.jar
          if-no-files-found: ignore
          retention-days: 7

  build-android:
    name: Android
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Assemble debug APK + run unit tests
        run: ./gradlew :androidApp:assembleDebug :androidApp:testDebugUnitTest --stacktrace
      - name: Publish Android test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Android tests report
          report_paths: 'androidApp/build/test-results/**/TEST-*.xml'
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: androidApp-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7

  build-ios:
    name: iOS framework
    needs: [lint, changes]
    if: github.event_name == 'push' || needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: |
            ~/.konan/dependencies
            ~/.konan/kotlin-native-prebuilt-*
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - uses: gradle/actions/setup-gradle@v6
      - name: Link iOS Simulator framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace
