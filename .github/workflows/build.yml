name: Build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ios:
              - 'app/shared/**'
              - 'core/**'
              - 'app/iosApp/**'
              - 'gradle/**'
              - 'build-logic/**'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - '.github/workflows/build.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Spotless + Detekt
        run: ./gradlew spotlessCheck detekt --stacktrace

  test-jvm:
    name: JVM tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run core + app:shared JVM tests
        run: ./gradlew :core:jvmTest :app:shared:jvmTest --stacktrace
      - name: Publish JVM test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: JVM tests report
          report_paths: '**/build/test-results/**/TEST-*.xml'

  build-server:
    name: Server
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build server + run server tests
        run: ./gradlew :server:build --stacktrace
      - name: Publish server test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Server tests report
          report_paths: 'server/build/test-results/**/TEST-*.xml'
      - name: Upload server JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: server-jar
          path: server/build/libs/*.jar
          if-no-files-found: ignore
          retention-days: 7

  coverage:
    name: Coverage
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run JVM tests + Kover reports (aggregated + per-module)
        run: ./gradlew :core:koverXmlReport :server:koverXmlReport :app:shared:koverXmlReport koverXmlReport koverHtmlReport --stacktrace
      - name: Render coverage table + badge JSON
        if: always()
        run: python3 .github/scripts/coverage_report.py
      - name: Post coverage table on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: build/reports/kover/comment.md
      - name: Verify coverage floors
        run: ./gradlew koverVerify --stacktrace
      - name: Upload Pages artifact
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/reports/kover/html

  deploy-coverage:
    name: Deploy coverage to Pages
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    name: Android
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Assemble debug APK + run unit tests
        run: ./gradlew :app:androidApp:assembleDebug :app:androidApp:testDebugUnitTest --stacktrace
      - name: Publish Android test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Android tests report
          report_paths: 'app/androidApp/build/test-results/**/TEST-*.xml'
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: androidApp-debug-apk
          path: app/androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7

  build-ios:
    name: iOS framework
    needs: [lint, changes]
    if: github.event_name == 'push' || needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: |
            ~/.konan/dependencies
            ~/.konan/kotlin-native-prebuilt-*
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - uses: gradle/actions/setup-gradle@v6
      - name: Link iOS Simulator framework
        run: ./gradlew :app:shared:linkDebugFrameworkIosSimulatorArm64 --stacktrace
