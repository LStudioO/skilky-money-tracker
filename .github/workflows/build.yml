name: Build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ios:
              - 'app/shared/**'
              - 'core/**'
              - 'app/iosApp/**'
              - 'gradle/**'
              - 'build-logic/**'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - '.github/workflows/build.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Spotless + Detekt
        run: ./gradlew spotlessCheck detekt --stacktrace

  build-server:
    name: Server
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Assemble server artifacts
        run: ./gradlew :server:assemble --stacktrace
      - name: Upload server JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: server-jar
          path: server/build/libs/*.jar
          if-no-files-found: ignore
          retention-days: 7

  test-core:
    name: Test :core
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Test + Kover
        run: ./gradlew :core:jvmTest :core:koverXmlReport :core:koverHtmlReport :core:koverVerify --continue --stacktrace
      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: :core tests report
          report_paths: 'core/build/test-results/**/TEST-*.xml'
      - name: Upload :core coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-core
          path: core/build/reports/kover/
          if-no-files-found: error
          retention-days: 7

  test-server:
    name: Test :server
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Test + Kover
        run: ./gradlew :server:test :server:koverXmlReport :server:koverHtmlReport :server:koverVerify --continue --stacktrace
      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: :server tests report
          report_paths: 'server/build/test-results/**/TEST-*.xml'
      - name: Upload :server coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-server
          path: server/build/reports/kover/
          if-no-files-found: error
          retention-days: 7

  test-shared:
    name: Test :app:shared
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Test + Kover
        run: ./gradlew :app:shared:jvmTest :app:shared:koverXmlReport :app:shared:koverHtmlReport :app:shared:koverVerify --continue --stacktrace
      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: :app:shared tests report
          report_paths: 'app/shared/build/test-results/**/TEST-*.xml'
      - name: Upload :app:shared coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-app-shared
          path: app/shared/build/reports/kover/
          if-no-files-found: error
          retention-days: 7

  test-desktop:
    name: Test :app:desktopApp
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Test + Kover
        run: ./gradlew :app:desktopApp:test :app:desktopApp:koverXmlReport :app:desktopApp:koverHtmlReport :app:desktopApp:koverVerify --continue --stacktrace
      - name: Upload :app:desktopApp coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-app-desktopApp
          path: app/desktopApp/build/reports/kover/
          if-no-files-found: error
          retention-days: 7

  coverage:
    name: Coverage
    needs: [test-core, test-server, test-shared, build-android, test-desktop]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Download :core coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-core
          path: core/build/reports/kover/
      - name: Download :server coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-server
          path: server/build/reports/kover/
      - name: Download :app:shared coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-app-shared
          path: app/shared/build/reports/kover/
      - name: Download :app:androidApp coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-app-androidApp
          path: app/androidApp/build/reports/kover/
      - name: Download :app:desktopApp coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-app-desktopApp
          path: app/desktopApp/build/reports/kover/
      - name: Render coverage table, badge, and Pages index
        run: python3 .github/scripts/coverage_report.py
      - name: Post coverage table on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: build/reports/kover/comment.md
      - name: Assemble Pages site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p site
          cp build/reports/kover/index.html site/
          cp build/reports/kover/badge.json site/
          cp -r core/build/reports/kover/html site/core
          cp -r server/build/reports/kover/html site/server
          cp -r app/shared/build/reports/kover/html site/app-shared
          cp -r app/androidApp/build/reports/kover/html site/app-androidApp
          cp -r app/desktopApp/build/reports/kover/html site/app-desktopApp
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-coverage:
    name: Deploy coverage to Pages
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  build-android:
    name: Android
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Assemble debug APK + run unit tests + Kover
        run: ./gradlew :app:androidApp:assembleDebug :app:androidApp:testDebugUnitTest :app:androidApp:koverXmlReport :app:androidApp:koverHtmlReport :app:androidApp:koverVerify --continue --stacktrace
      - name: Publish Android test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          check_name: Android tests report
          report_paths: 'app/androidApp/build/test-results/**/TEST-*.xml'
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: androidApp-debug-apk
          path: app/androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload :app:androidApp coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-app-androidApp
          path: app/androidApp/build/reports/kover/
          if-no-files-found: error
          retention-days: 7

  build-ios:
    name: iOS framework
    needs: [lint, changes]
    if: github.event_name == 'push' || needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: |
            ~/.konan/dependencies
            ~/.konan/kotlin-native-prebuilt-*
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - uses: gradle/actions/setup-gradle@v6
      - name: Link iOS Simulator framework
        run: ./gradlew :app:shared:linkDebugFrameworkIosSimulatorArm64 --stacktrace
