name: Build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Spotless + Detekt
        run: ./gradlew spotlessCheck detekt --stacktrace

  test-jvm:
    name: JVM tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run shared + composeApp JVM tests
        run: ./gradlew :shared:jvmTest :composeApp:jvmTest --stacktrace

  build-server:
    name: Server
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build server + run server tests
        run: ./gradlew :server:build --stacktrace
      - name: Upload server JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/*.jar
          if-no-files-found: ignore
          retention-days: 7

  build-android:
    name: Android
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug APK + run unit tests
        run: ./gradlew :androidApp:assembleDebug :androidApp:testDebugUnitTest --stacktrace
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7

  build-ios:
    name: iOS framework
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Link iOS Simulator framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace
