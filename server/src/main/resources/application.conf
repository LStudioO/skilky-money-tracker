ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # Netty closes long-running handlers by default; bump for AI
        # calls that take minutes on CPU-only Ollama deployments. 0
        # disables the timeout entirely.
        requestReadTimeoutSeconds = 600
        requestReadTimeoutSeconds = ${?KTOR_REQUEST_READ_TIMEOUT_SECONDS}
        responseWriteTimeoutSeconds = 600
        responseWriteTimeoutSeconds = ${?KTOR_RESPONSE_WRITE_TIMEOUT_SECONDS}
        # Hard cap on inbound body size. Just above the 10 MB validators
        # cap on audio + receipt uploads so a malicious 100 MB POST is
        # rejected before reaching the handler.
        maxRequestSizeBytes = 11534336
        maxRequestSizeBytes = ${?KTOR_MAX_REQUEST_SIZE_BYTES}
    }
    application {
        modules = [ com.vstorchevyi.skilky.ApplicationKt.module ]
    }
}

skilky {
    api {
        version = "1.0.0"
    }
    cors {
        allowedHosts = "*"
        allowedHosts = ${?SKILKY_CORS_ALLOWED_HOSTS}
    }
    database {
        jdbcUrl = "jdbc:postgresql://localhost:5432/skilky"
        jdbcUrl = ${?DATABASE_JDBC_URL}
        user = "skilky"
        user = ${?DATABASE_USER}
        password = "skilky"
        password = ${?DATABASE_PASSWORD}
        maxPoolSize = 10
        maxPoolSize = ${?DATABASE_MAX_POOL_SIZE}
    }
    jwt {
        secret = "dev-secret-change-in-prod"
        secret = ${?JWT_SECRET}
        issuer = "skilky-tracker"
        issuer = ${?JWT_ISSUER}
        audience = "skilky-users"
        audience = ${?JWT_AUDIENCE}
        accessTokenExpirationDays = 7
        refreshTokenExpirationDays = 90
    }
    security {
        refreshTokenPepper = "dev-pepper-change-in-prod"
        refreshTokenPepper = ${?REFRESH_TOKEN_PEPPER}
        # BCrypt work factor. 12 is the production default; raise as
        # hardware improves. Tests pin a much lower value via test config.
        bcryptCost = 12
        bcryptCost = ${?BCRYPT_COST}
    }
    ai {
        baseUrl = "http://localhost:11434"
        baseUrl = ${?AI_BASE_URL}
        # gemma4:e4b handles text, audio (WAV 16kHz mono, ~30-60s), and
        # images in one model. Stays opt-in via AI_MODEL.
        model = "gemma4:e4b"
        model = ${?AI_MODEL}
        timeoutSeconds = 60
        timeoutSeconds = ${?AI_TIMEOUT_SECONDS}
        # Ollama's default is 5m; bumping to 30m keeps the model warm
        # across normal user pauses. "-1" pins it forever.
        keepAlive = "30m"
        keepAlive = ${?AI_KEEP_ALIVE}
    }
}
