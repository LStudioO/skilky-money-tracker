ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.vstorchevyi.skilky.ApplicationKt.module ]
    }
}

skilky {
    api {
        version = "1.0.0"
    }
    cors {
        allowedHosts = "*"
        allowedHosts = ${?SKILKY_CORS_ALLOWED_HOSTS}
    }
    database {
        jdbcUrl = "jdbc:postgresql://localhost:5432/skilky"
        jdbcUrl = ${?DATABASE_JDBC_URL}
        user = "skilky"
        user = ${?DATABASE_USER}
        password = "skilky"
        password = ${?DATABASE_PASSWORD}
        maxPoolSize = 10
        maxPoolSize = ${?DATABASE_MAX_POOL_SIZE}
    }
    jwt {
        secret = "dev-secret-change-in-prod"
        secret = ${?JWT_SECRET}
        issuer = "skilky-tracker"
        issuer = ${?JWT_ISSUER}
        audience = "skilky-users"
        audience = ${?JWT_AUDIENCE}
        accessTokenExpirationDays = 7
        refreshTokenExpirationDays = 90
    }
    security {
        refreshTokenPepper = "dev-pepper-change-in-prod"
        refreshTokenPepper = ${?REFRESH_TOKEN_PEPPER}
    }
}
