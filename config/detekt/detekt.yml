style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  ReturnCount:
    max: 3
  ThrowsCount:
    max: 6

complexity:
  TooManyFunctions:
    allowedFunctionsPerClass: 20
    allowedFunctionsPerFile: 20
  LongParameterList:
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'androidx.compose.runtime.Composable'
  MatchingDeclarationName:
    active: false
